services:
  postgres:
    image: postgres:16-alpine
    container_name: vclipper-postgres
    environment:
      POSTGRES_USER: vclipper
      POSTGRES_PASSWORD: vclipper
      POSTGRES_DB: vclipper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
